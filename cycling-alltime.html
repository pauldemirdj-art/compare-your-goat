<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyclisme — Comparateur All Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8930A;--goldl:#FDF5DC;--goldb:rgba(200,147,10,.15);
  --blue:#1A6BB5;--bluel:#E6F0FA;--blueb:rgba(26,107,181,.15);
  --purple:#7C3FBE;--purplel:#F2EBFD;--purpleb:rgba(124,63,190,.15);
  --text:#18181a;--text2:#5a5a60;--text3:#9a9aa0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.15);
  --bg:#f0ede8;--bgc:#fff;--bg2:#f6f4f0;--bg3:#edebe6;
}
@media(prefers-color-scheme:dark){:root{
  --gold:#D4A030;--goldl:#281d08;--goldb:rgba(212,160,48,.2);
  --blue:#4A9FE0;--bluel:#0a1e32;--blueb:rgba(74,159,224,.2);
  --purple:#A06EE0;--purplel:#1a0e30;--purpleb:rgba(160,110,224,.2);
  --text:#e2e0da;--text2:#9a9a9e;--text3:#5e5e64;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --bg:#111009;--bgc:#1a1916;--bg2:#222018;--bg3:#2a2825;
}}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HERO ── */
.hero{background:var(--bgc);border-bottom:1px solid var(--border);padding:2.5rem 1.5rem 1.8rem;text-align:center}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,9vw,80px);line-height:1;letter-spacing:.04em}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:6px}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:320px 1fr;max-width:1200px;margin:0 auto;gap:0;min-height:calc(100vh - 180px)}
@media(max-width:860px){.layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}}

/* ── SIDEBAR ── */
.sidebar{background:var(--bgc);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:calc(100vh - 160px);overflow:hidden}
@media(max-width:860px){.sidebar{position:relative;height:auto;max-height:60vh;border-right:none;border-bottom:1px solid var(--border)}}

.sidebar-top{padding:1rem 1rem .6rem;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem}

/* search */
.search-wrap{position:relative;margin-bottom:.6rem}
.search-wrap input{
  width:100%;padding:8px 10px 8px 32px;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;
  outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}

/* era filter */
.era-filters{display:flex;gap:5px;flex-wrap:wrap}
.era-btn{
  font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;
  border:1px solid var(--border2);background:var(--bg2);color:var(--text3);
  cursor:pointer;transition:all .12s;letter-spacing:.03em;font-family:inherit}
.era-btn:hover{border-color:var(--border2);color:var(--text2)}
.era-btn.active{background:var(--goldl);border-color:var(--gold);color:var(--gold)}

/* rider list */
.rider-list{overflow-y:auto;flex:1;padding:.5rem 0}
.rider-list::-webkit-scrollbar{width:4px}
.rider-list::-webkit-scrollbar-track{background:transparent}
.rider-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.rider-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 1rem;cursor:pointer;transition:background .1s;
  border-left:3px solid transparent;
}
.rider-item:hover{background:var(--bg2)}
.rider-item.sel-0{background:var(--goldl);border-left-color:var(--gold)}
.rider-item.sel-1{background:var(--bluel);border-left-color:var(--blue)}
.rider-item.sel-2{background:var(--purplel);border-left-color:var(--purple)}

.rider-rank{font-size:10px;font-weight:500;color:var(--text3);min-width:22px;text-align:right}
.rider-flag{font-size:16px;flex-shrink:0}
.rider-info{flex:1;min-width:0}
.rider-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rider-item.sel-0 .rider-name{color:var(--gold)}
.rider-item.sel-1 .rider-name{color:var(--blue)}
.rider-item.sel-2 .rider-name{color:var(--purple)}
.rider-era-tag{font-size:10px;color:var(--text3)}
.rider-sel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:none}
.rider-item.sel-0 .rider-sel-dot{display:block;background:var(--gold)}
.rider-item.sel-1 .rider-sel-dot{display:block;background:var(--blue)}
.rider-item.sel-2 .rider-sel-dot{display:block;background:var(--purple)}

.sidebar-footer{padding:.7rem 1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-style:italic}

/* ── MAIN CONTENT ── */
.content{padding:1.5rem;overflow-y:auto}

/* selected strip */
.sel-strip{background:var(--bgc);border:1px solid var(--border);border-radius:12px;padding:.8rem 1.2rem;margin-bottom:1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.sel-names{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sel-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,4vw,34px);letter-spacing:.04em;line-height:1}
.sel-sep{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text3)}
.sel-hint{font-size:11px;color:var(--text3);font-style:italic}

/* legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1.2rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* empty */
.empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:1rem}
.empty p{font-size:14px}

/* categories */
.cat-card{background:var(--bgc);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.2rem}

.cat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.2rem;background:var(--bg2);border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;transition:opacity .15s}
.cat-header:hover{opacity:.8}
.cat-left{display:flex;align-items:center;gap:8px}
.cat-icon{font-size:17px}
.cat-label{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text2)}
.cat-right{display:flex;align-items:center;gap:8px}
.cat-totals{display:flex;align-items:baseline;gap:5px}
.cat-total{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}
.cat-sep{font-size:12px;color:var(--text3)}
.chev{font-size:10px;color:var(--text3);transition:transform .2s;display:inline-block}
.chev.open{transform:rotate(180deg)}

/* sub rows */
.sub-rows{display:block}
.sub-rows.collapsed{display:none}
.sub-wrap{border-top:1px solid var(--border)}
.sub-row{
  display:grid;align-items:center;gap:8px;
  padding:.5rem 1.2rem;cursor:pointer;transition:background .1s}
.sub-row:hover{background:var(--bg2)}
.sub-row.n1{grid-template-columns:1fr 150px 1fr}
.sub-row.n2{grid-template-columns:1fr auto 1fr auto 1fr}
.sub-row.n3{grid-template-columns:1fr 1fr auto 1fr 1fr}

.sb{display:flex;align-items:center;gap:6px}
.sb.l{flex-direction:row}
.sb.r{flex-direction:row-reverse}
.snum{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;min-width:18px}
.bwrap{flex:1;height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;min-width:16px}
.bfill{height:100%;border-radius:2px}
.bfill.l{margin-left:auto}

.slabel{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);text-align:center;line-height:1.3}
.slabel-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* detail */
.sub-detail{display:none;padding:.6rem 1.2rem .8rem;background:var(--bg2);border-top:1px solid var(--border)}
.sub-detail.open{display:block}
.detail-cols{display:flex;gap:16px;flex-wrap:wrap}
.dcol{flex:1;min-width:100px}
.dtitle{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding-bottom:4px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.ditem{font-size:11px;color:var(--text2);padding:1.5px 0;line-height:1.5}

footer{text-align:center;padding:2rem 1rem;font-size:11px;color:var(--text3);font-style:italic}

.no-results{padding:1.5rem 1rem;text-align:center;font-size:12px;color:var(--text3);font-style:italic}
</style>
</head>

// ─── CATEGORIES ───────────────────────────────────────────
const CATS = [
  {id:'grandtours',label:'Grands Tours',icon:'🏔',rows:[
    {id:'tdf',label:'Tour de France'},{id:'giro',label:"Tour d'Italie"},{id:'vuelta',label:"Tour d'Espagne"},
  ]},
  {id:'etapes',label:'Courses par étapes',icon:'📅',rows:[
    {id:'paris_nice',label:'Paris–Nice'},{id:'tirreno',label:'Tirreno-Adriatico'},
    {id:'romandie',label:'Tour de Romandie'},{id:'catalogne',label:'Tour de Catalogne'},
    {id:'dauphine',label:'Critérium du Dauphiné'},{id:'suisse',label:'Tour de Suisse'},{id:'uae',label:'UAE Tour'},
  ]},
  {id:'monuments',label:'Monuments',icon:'🏛',rows:[
    {id:'msr',label:'Milan–San Remo'},{id:'flandres',label:'Tour des Flandres'},
    {id:'roubaix',label:'Paris–Roubaix'},{id:'lbl',label:'Liège–Bastogne–Liège'},{id:'lombardie',label:'Tour de Lombardie'},
  ]},
  {id:'classiques',label:'Classiques',icon:'🏅',rows:[
    {id:'fleche',label:'Flèche Wallonne'},{id:'gand',label:'Gand–Wevelgem'},
    {id:'amstel',label:'Amstel Gold Race'},{id:'strade',label:'Strade Bianche'},{id:'montreal',label:'GP de Montréal'},
  ]},
];

// ─── STATE ────────────────────────────────────────────────
let selected = [];
let openCats = {grandtours:true,etapes:true,monuments:true,classiques:true};
let openDetails = {};
let searchVal = '';
let eraFilter = 'all';

// ─── HELPERS ──────────────────────────────────────────────
function winner(vals){ const m=Math.max(...vals); const idx=vals.indexOf(m); return vals.filter(v=>v===m).length>1?'tie':idx; }
function pct(v,max){ return max===0?0:Math.round(v/max*100); }

// ─── SIDEBAR ──────────────────────────────────────────────
function renderSidebar(){
  const q = searchVal.toLowerCase();
  const list = document.getElementById('rider-list');
  list.innerHTML = '';
  const filtered = RIDERS.filter(r=>{
    const matchSearch = r.name.toLowerCase().includes(q);
    const matchEra = eraFilter==='all' || r.eraKey===eraFilter;
    return matchSearch && matchEra;
  });
  if(!filtered.length){
    list.innerHTML='<div class="no-results">Aucun coureur trouvé</div>';
    return;
  }
  filtered.forEach((r,i)=>{
    const idx = selected.indexOf(r.id);
    const div = document.createElement('div');
    div.className = 'rider-item'+(idx>=0?' '+CK[idx]:'');
    div.innerHTML = `<span class="rider-rank">${RIDERS.indexOf(r)+1}</span><span class="rider-flag">${r.flag}</span><div class="rider-info"><div class="rider-name">${r.name}</div><div class="rider-era-tag">${r.era}</div></div><span class="rider-sel-dot"></span>`;
    div.onclick = ()=>toggleRider(r.id);
    list.appendChild(div);
  });
  document.getElementById('sidebar-footer').textContent =
    selected.length===0 ? 'Aucun coureur sélectionné' :
    selected.length===3 ? '3 coureurs sélectionnés (maximum)' :
    `${selected.length} coureur${selected.length>1?'s':''} sélectionné${selected.length>1?'s':''} · ${3-selected.length} restant${3-selected.length>1?'s':''}`;
}

// ─── TOGGLE ───────────────────────────────────────────────
function toggleRider(id){
  const idx = selected.indexOf(id);
  if(idx>=0) selected.splice(idx,1);
  else{ if(selected.length>=3) return; selected.push(id); }
  renderSidebar();
  renderContent();
}

// ─── CONTENT ──────────────────────────────────────────────
function renderContent(){
  const el = document.getElementById('content');
  if(selected.length===0){
    el.innerHTML='<div class="empty"><div class="icon">🚴</div><p>Clique sur des coureurs dans la liste pour démarrer la comparaison</p></div>';
    return;
  }
  const riders = selected.map(id=>RIDERS.find(r=>r.id===id));
  const n = riders.length;
  let html = '';

  // Selected strip
  html += '<div class="sel-strip"><div class="sel-names">';
  riders.forEach((r,i)=>{
    if(i>0) html+=`<span class="sel-sep">×</span>`;
    html+=`<span class="sel-name" style="color:${CV[i]}">${r.flag} ${r.name}</span>`;
  });
  html+='</div>';
  if(selected.length<3) html+=`<span class="sel-hint">+ ${3-selected.length} coureur${3-selected.length>1?'s':''} possible${3-selected.length>1?'s':''}</span>`;
  html+='</div>';

  // Legend
  if(n>=2){
    html+='<div class="legend">';
    riders.forEach((r,i)=>{ html+=`<div class="legend-item"><div class="legend-dot" style="background:${CV[i]}"></div>${r.name}</div>`; });
    html+='</div>';
  }

  // Categories
  CATS.forEach(cat=>{
    const totals = riders.map(r=>cat.rows.reduce((s,row)=>s+r[cat.id][row.id].v,0));
    const collapsed = !openCats[cat.id];

    html+=`<div class="cat-card">`;
    html+=`<div class="cat-header" onclick="toggleCat('${cat.id}')">
      <div class="cat-left"><span class="cat-icon">${cat.icon}</span><span class="cat-label">${cat.label}</span></div>
      <div class="cat-right"><div class="cat-totals">`;
    totals.forEach((t,i)=>{
      if(i>0) html+=`<span class="cat-sep">–</span>`;
      html+=`<span class="cat-total" style="color:${CV[i]}">${t}</span>`;
    });
    html+=`</div><span class="chev${collapsed?'':' open'}" id="chev-${cat.id}">▼</span></div></div>`;

    html+=`<div class="sub-rows${collapsed?' collapsed':''}" id="subrows-${cat.id}">`;
    cat.rows.forEach(row=>{
      const vals = riders.map(r=>r[cat.id][row.id].v);
      const maxV = Math.max(...vals,1);
      const did = `${cat.id}-${row.id}`;
      const detOpen = openDetails[did];

      html+=`<div class="sub-wrap">`;
      html+=`<div class="sub-row n${n}" onclick="toggleDetail('${did}')">`;

      if(n===1){
        html+=`<div class="sb l"><span class="snum" style="color:${CV[0]}">${vals[0]}</span><div class="bwrap"><div class="bfill l" style="width:${pct(vals[0],maxV)}%;background:${CV[0]}"></div></div></div>`;
        html+=`<div class="slabel-wrap"><span class="slabel">${row.label}</span></div>`;
        html+=`<div></div>`;
      } else if(n===2){
        html+=`<div class="sb l"><span class="snum" style="color:${CV[0]}">${vals[0]}</span><div class="bwrap"><div class="bfill l" style="width:${pct(vals[0],maxV)}%;background:${CV[0]}"></div></div></div>`;
        html+=`<div></div>`;
        html+=`<div class="slabel-wrap"><span class="slabel">${row.label}</span></div>`;
        html+=`<div></div>`;
        html+=`<div class="sb r"><span class="snum" style="color:${CV[1]}">${vals[1]}</span><div class="bwrap"><div class="bfill" style="width:${pct(vals[1],maxV)}%;background:${CV[1]}"></div></div></div>`;
      } else {
        html+=`<div class="sb l"><span class="snum" style="color:${CV[0]}">${vals[0]}</span><div class="bwrap"><div class="bfill l" style="width:${pct(vals[0],maxV)}%;background:${CV[0]}"></div></div></div>`;
        html+=`<div class="sb l"><span class="snum" style="color:${CV[1]}">${vals[1]}</span><div class="bwrap"><div class="bfill l" style="width:${pct(vals[1],maxV)}%;background:${CV[1]}"></div></div></div>`;
        html+=`<div class="slabel-wrap"><span class="slabel">${row.label}</span></div>`;
        html+=`<div class="sb r"><span class="snum" style="color:${CV[2]}">${vals[2]}</span><div class="bwrap"><div class="bfill" style="width:${pct(vals[2],maxV)}%;background:${CV[2]}"></div></div></div>`;
        html+=`<div></div>`;
      }

      html+=`</div>`;
      html+=`<div class="sub-detail${detOpen?' open':''}" id="det-${did}"><div class="detail-cols">`;
      riders.forEach((r,i)=>{
        const info = r[cat.id][row.id];
        html+=`<div class="dcol"><div class="dtitle" style="color:${CV[i]}">${r.name}</div>`;
        info.d.forEach(d=>{ html+=`<div class="ditem">— ${d}</div>`; });
        html+=`</div>`;
      });
      html+=`</div></div></div>`;
    });
    html+=`</div></div>`;
  });

  el.innerHTML = html;
}

// ─── CONTROLS ─────────────────────────────────────────────
function toggleCat(id){
  openCats[id]=!openCats[id];
  const sr=document.getElementById('subrows-'+id);
  const chev=document.getElementById('chev-'+id);
  if(sr) sr.classList.toggle('collapsed',!openCats[id]);
  if(chev) chev.classList.toggle('open',openCats[id]);
}

function toggleDetail(did){
  openDetails[did]=!openDetails[did];
  const el=document.getElementById('det-'+did);
  if(el) el.classList.toggle('open',openDetails[did]);
}

// ─── INIT ─────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  searchVal=e.target.value;
  renderSidebar();
});

document.getElementById('era-filters').addEventListener('click',e=>{
  const btn=e.target.closest('.era-btn');
  if(!btn) return;
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  eraFilter=btn.dataset.era;
  renderSidebar();
});

renderSidebar();
renderContent();
</script>
